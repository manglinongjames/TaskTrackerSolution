<h2>
  Tasks List
</h2>

<div>
  <table>
    <thead>
      <tr>
        <td>Id</td>
        <td>Title</td>
        <td>Description</td>
        <td>Status</td>
        <td>Due Date</td>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let task of tasks">
        <td>{{ task.id }}</td>
        <td>{{ task.title }}</td>
        <td>{{ task.description }}</td>
        <td>{{ task.status }}</td>
        <td>{{ task.dueDate | date }}</td>
      </tr>
  </table>
</div>

<div>
  <div>
    <h3>Create City</h3>


    <form [formGroup]="postTaskForm" (ngSubmit)="postTaskSubmitted()">
      <label for="title">Title:</label>
      <input type="text" formControlName="title">
      <span class="text-red" *ngIf="(postTask_TitleNameControl.touched || isPostTaskFormSubmitted) && (postTask_TitleNameControl).errors?.['required']">Cannot be blank</span>

      <br />
      <label for="description">Description:</label>
      <input type="text" formControlName="description">

      <br />
      <label for="status">Status:</label>
      <select id="status" formControlName="status" name="status">
        <option value="NotStarted">To do</option>
        <option value="InProgress">In Progress</option>
        <option value="Completed">Done</option>
      </select>

      <br />
      <label for="dueDate">Due Date:</label>
      <input type="date" formControlName="dueDate"  name="dueDate">

      <br />
      <button>Create Task</button>
    </form>

  </div>
</div>
